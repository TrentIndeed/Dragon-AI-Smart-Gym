<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings — Smart Gym</title>
  <style>
    :root{
      --bg0:#000000;
      --bg1:#000000;
      --card:#15171C;
      --card2:#121419;
      --stroke:#2A2D34;
      --text:#FFFFFF;
      --muted:#B7C0D3;
      --muted2:#8D98B2;
      --divider:#23262D;
      --gold:#D4A455;
      --blue:#2C6BFF;
      --red:#E34141;
      --shadow: 0 14px 40px rgba(0,0,0,.70);
      --blur: 10px;
      --radius: 18px;
    }

    *{box-sizing:border-box;}
    html,body{
      margin:0;
      width:100%;
      height:100%;
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
      color:var(--text);
      background:#000;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0;
    }

    /* Phone frame (9:16) */
    .phone{
      width:100%;
      max-width:430px; /* iPhone Pro Max width */
      height:100%;
      max-height: calc(100vw * 16 / 9); /* enforce 9:16 */
      aspect-ratio: 9 / 16;
      border-radius: 0; /* edge-to-edge app */
      background:#000;
      box-shadow:none;
      overflow:hidden;
      position:relative;
    }

    /* Subtle vignette */
    .phone::before{content:none;}

    .screen{
      position:absolute; inset:0;
      padding:14px 16px 16px; /* tighter vertical spacing */
      display:flex;
      flex-direction:column;
      gap:10px;
      overflow-y:auto; /* allow scrolling on smaller screens */
      -webkit-overflow-scrolling: touch;
    }

    /* Header */
    .header{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:6px 2px 0;
    }

    .header .left,
    .header .right{
      width:44px; height:44px;
      display:grid; place-items:center;
      border-radius:14px;
      color:rgba(233,238,249,.9);
      background:transparent;
      border:0;
      cursor:pointer;
    }

    .header .left:hover,
    .header .right:hover{background:rgba(255,255,255,.04);}

    .title{
      font-size:26px; /* slightly smaller to save vertical space */
      font-weight:700;
      letter-spacing:.2px;
      margin-top:0;
    }

    .section-label{
      color:rgba(152,167,198,.9);
      font-size:14px;
      font-weight:600;
      letter-spacing:.2px;
      margin:2px 2px -6px;
    }

    /* Generic card */
    .card{
      background: rgba(21,23,28,.92);
      border: 1px solid rgba(42,45,52,.95);
      box-shadow: var(--shadow);
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
      border-radius: var(--radius);
    }

    /* Privacy row card */
    .row-card{
      display:flex;
      align-items:center;
      padding:14px 14px;
      gap:12px;
    }

    .row-card .icon{
      width:34px; height:34px;
      border-radius:12px;
      display:grid; place-items:center;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.05);
    }

    .row-card .text{
      flex:1;
      font-size:15px;
      font-weight:600;
      color:rgba(233,238,249,.95);
    }

    .row-card .chev{
      opacity:.7;
      width:18px; height:18px; /* normalize chevron size */
    }

    /* Big badges */
    .badges{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:14px;
      margin-top:4px;
    }

    .badge{
      height:112px; /* reduced so Workout Settings is visible */
      border-radius: 20px;
      position:relative;
      padding:12px;
      background:
        radial-gradient(120px 120px at 50% 20%, rgba(255,255,255,.05), transparent 60%),
        rgba(21,23,28,.92);
      border: 1px solid rgba(42,45,52,.95);
      box-shadow: 0 14px 40px rgba(0,0,0,.70);
      backdrop-filter: blur(var(--blur));
      -webkit-backdrop-filter: blur(var(--blur));
      overflow:hidden;
    }

    .badge::after{
      content:"";
      position:absolute;
      inset:8px;              /* pull ring outward */
      border-radius:16px;
      border: 2px solid rgba(255,255,255,.04);
      pointer-events:none;
      z-index:1;              /* keep ring below content */
    }

    .badge.gold::after{ border-color: rgba(212,164,85,.75); box-shadow: inset 0 0 0 1px rgba(212,164,85,.12); }
    .badge.blue::after{ border-color: rgba(44,107,255,.70); box-shadow: inset 0 0 0 1px rgba(44,107,255,.12); }

    .badge .center{
      position:relative;
      z-index:2;
      height:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      gap:1px;                 /* tighter title–subtitle spacing */
      padding-top:4px;
      text-align:center;
    }

    .badge .label{
      font-size:13.5px;
      font-weight:700;
      color:rgba(233,238,249,.92);
      margin-top:0;
      transform: translateY(-6px); /* lift above ring */
    }

    .badge .sub{
      margin-top:-1px;          /* pull subtitle closer */
      font-size:11px;
      color:rgba(152,167,198,.85);
      font-weight:600;
      transform: translateY(-6px); /* lift above ring */
    }

    .badge .art{
      margin-top:0; /* remove downward push */
      width:54px;
      height:54px;
      display:grid; place-items:center;
      filter: drop-shadow(0 10px 20px rgba(0,0,0,.45));
    }

    /* Brand row */
    .brand{
      display:flex;
      align-items:flex-start;
      gap:12px;
      margin-top:2px;
      padding: 2px 2px 0;
    }

    .brand .logo{
      width:46px; height:46px;
      display:grid; place-items:center;
    }

    .brand .name{
      font-size:28px;
      font-weight:800;
      letter-spacing:.2px;
      line-height:1;
      margin-top:6px;
    }

    .brand .handle{
      color:rgba(152,167,198,.9);
      font-weight:600;
      font-size:12.5px;
      margin-top:6px;
    }

    .divider{
      height:1px;
      background: linear-gradient(90deg, transparent, rgba(26,38,64,.95), transparent);
      margin: 2px 2px 0;
    }

    /* Workout settings list */
    .list{
      padding:12px 10px; /* uniform outer padding */
    }

    .item{
      display:flex;
      align-items:center;
      gap:10px;
      border-radius:14px;
      position:relative;
      height:64px;           /* force identical row height */
      padding:0 10px;        /* consistent vertical rhythm */
    }

    .item + .item{
      border-top: 1px solid rgba(255,255,255,.04);
      border-top-left-radius: 0;
      border-top-right-radius: 0;
    }

    .item .i{
      width:30px; height:30px;
      border-radius:12px;
      display:grid; place-items:center;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.05);
      color:rgba(233,238,249,.92);
      flex:0 0 auto;
    }

    /* Normalize icon sizes inside list rows (fix Smartwatch icon) */
    .item .i svg{
      width:18px;
      height:18px;
    }

    .item .t{
      flex:1;
      font-size:14px;
      font-weight:650;
      color:rgba(233,238,249,.95);
    }

    .item .meta{
      font-size:12px;
      font-weight:700;
      color:rgba(152,167,198,.85);
      margin-right:10px;
    }

    /* Custom toggles */
    .toggle{
      width:46px;
      height:26px;
      border-radius:999px;
      position:relative;
      border: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.08);
      box-shadow: inset 0 2px 6px rgba(0,0,0,.55);
      cursor:pointer;
      flex:0 0 auto;
      transition: background .2s ease, border-color .2s ease;
    }

    .toggle .knob{
      position:absolute;
      top:2px;
      left:2px;
      width:22px;
      height:22px;
      border-radius:999px;
      background: rgba(233,238,249,.85);
      box-shadow: 0 8px 18px rgba(0,0,0,.55);
      transition: transform .2s ease;
    }

    .toggle[data-on="true"]{
      background: rgba(233,238,249,.92);
      border-color: rgba(233,238,249,.35);
    }
    .toggle[data-on="true"] .knob{ transform: translateX(20px); background: rgba(16,22,38,.95); }

    .toggle[data-on="false"]{ background: rgba(255,255,255,.08); }
    .toggle[data-on="false"] .knob{ background: rgba(233,238,249,.55); }

    /* Smartwatch row right affordance */
    .pill{
      width:30px; height:18px;
      border-radius:999px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      position:relative;
      opacity:.8;
    }
    .pill::after{
      content:"";
      width:14px; height:14px;
      border-radius:999px;
      background: rgba(233,238,249,.22);
      position:absolute;
      top:1px; left:1px;
    }

    /* Logout */
    .logout{
      margin-top:16px; /* no longer force-pushed offscreen */
      width:100%;
      height:52px;
      border-radius: 26px;
      border: 2px solid rgba(227,65,65,.75);
      color: rgba(227,65,65,.95);
      background: rgba(0,0,0,.12);
      font-weight:800;
      letter-spacing:.2px;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow: 0 16px 40px rgba(0,0,0,.55);
      cursor:pointer;
      transition: transform .08s ease, background .15s ease;
    }
    .logout:active{ transform: translateY(1px); }
    .logout:hover{ background: rgba(227,65,65,.06); }

    /* Small helper */
    .sr-only{position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;}

    /* Make it look like a real app on wide screens */
    @media (min-width: 900px){
      .phone{
        border-radius:34px;
        box-shadow: 0 35px 90px rgba(0,0,0,.75);
      }
    }
  </style>
</head>
<body>
  <div class="phone" role="application" aria-label="Smart gym settings">
    <div class="screen">
      <div class="header">
        <button class="left" aria-label="Back">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M15 6l-6 6 6 6" stroke="rgba(233,238,249,.9)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <div class="title">Settings</div>
        <button class="right" aria-label="Account">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M12 12a4.2 4.2 0 1 0 0-8.4A4.2 4.2 0 0 0 12 12Z" stroke="rgba(233,238,249,.9)" stroke-width="2"/>
            <path d="M4.5 20.4c1.9-4.1 13.1-4.1 15 0" stroke="rgba(233,238,249,.9)" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>

      <div class="section-label">Account</div>
      <div class="card row-card" role="button" tabindex="0" aria-label="Privacy and Security">
        <div class="icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <path d="M12 2l8 4v6c0 5-3.4 9.4-8 10-4.6-.6-8-5-8-10V6l8-4Z" stroke="rgba(233,238,249,.9)" stroke-width="2"/>
            <path d="M9.2 12.2l1.8 1.8 3.9-3.9" stroke="rgba(233,238,249,.9)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="text">Privacy &amp; Security</div>
        <svg class="chev" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M9 6l6 6-6 6" stroke="rgba(233,238,249,.8)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <div class="section-label" style="margin-top:2px;">App</div>
      <div class="badges">
        <div class="badge gold" role="button" tabindex="0" aria-label="Profile">
          <div class="center">
            <div class="art" aria-hidden="true">
              <svg width="54" height="54" viewBox="0 0 64 64" fill="none">
                <path d="M32 5l22 13v28L32 59 10 46V18L32 5Z" fill="#3B2F23" opacity=".85"/>
                <path d="M32 9.5l18 10.6v23.8L32 54.5 14 43.9V20.1L32 9.5Z" fill="#B98B3E" opacity=".85"/>
                <circle cx="32" cy="31" r="13" fill="rgba(233,238,249,.92)"/>
                <circle cx="27.5" cy="29" r="1.6" fill="#101626"/>
                <circle cx="36.5" cy="29" r="1.6" fill="#101626"/>
                <path d="M27.5 35c1.8 2.1 7.2 2.1 9 0" stroke="#101626" stroke-width="2.2" stroke-linecap="round"/>
              </svg>
            </div>
            <div class="label">Profile</div>
            <div class="sub">Edit your profile</div>
          </div>
        </div>

        <div class="badge blue" role="button" tabindex="0" aria-label="Language">
          <div class="center">
            <div class="art" aria-hidden="true">
              <svg width="54" height="54" viewBox="0 0 64 64" fill="none">
                <path d="M32 6l22 10v16c0 13-9.3 23.8-22 26C19.3 55.8 10 45 10 32V16L32 6Z" fill="rgba(233,238,249,.18)"/>
                <path d="M32 10l18 8.1V32c0 10.9-7.3 19.7-18 22-10.7-2.3-18-11.1-18-22V18.1L32 10Z" fill="rgba(44,107,255,.30)"/>
                <path d="M21 34l10-10 12 12" stroke="rgba(233,238,249,.9)" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M30.8 24.2l-9.8 9.8" stroke="rgba(233,238,249,.9)" stroke-width="3.2" stroke-linecap="round"/>
              </svg>
            </div>
            <div class="label">Language</div>
            <div class="sub">Language &amp; region</div>
          </div>
        </div>
      </div>

      <div class="divider" aria-hidden="true"></div>

      <div class="section-label">Workout Settings</div>
      <div class="card list" role="group" aria-label="Workout Settings">
        <div class="item">
          <div class="i" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="M6 9l6-6 6 6" stroke="rgba(233,238,249,.9)" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M6 15l6 6 6-6" stroke="rgba(233,238,249,.9)" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="t">Auto Retract</div>
          <div class="meta">On</div>
          <button class="toggle" data-on="true" aria-label="Toggle Auto Retract" type="button"><span class="knob"></span></button>
        </div>

        <div class="item">
          <div class="i" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="M4 7h12" stroke="rgba(233,238,249,.9)" stroke-width="2.3" stroke-linecap="round"/>
              <path d="M4 12h16" stroke="rgba(233,238,249,.9)" stroke-width="2.3" stroke-linecap="round"/>
              <path d="M4 17h10" stroke="rgba(233,238,249,.9)" stroke-width="2.3" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="t">Haptics</div>
          <div class="meta">Off</div>
          <button class="toggle" data-on="false" aria-label="Toggle Haptics" type="button"><span class="knob"></span></button>
        </div>

        <div class="item">
          <div class="i" aria-hidden="true">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <rect x="8" y="3" width="8" height="18" rx="3" stroke="rgba(233,238,249,.9)" stroke-width="2"/>
              <path d="M10 3V1m4 2V1" stroke="rgba(233,238,249,.9)" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="t">Smartwatch</div>
          <svg class="chev" viewBox="0 0 24 24" fill="none" aria-hidden="true" style="opacity:.55; margin-left:auto; width:18px; height:18px;">
            <path d="M9 6l6 6-6 6" stroke="rgba(233,238,249,.8)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>

      <button class="logout" type="button">Logout</button>
    </div>
  </div>

  <script>
    // Toggle behavior (visual only, wire to your state/store as needed)
    const toggles = document.querySelectorAll('.toggle');
    toggles.forEach(t => {
      t.addEventListener('click', () => {
        const on = t.getAttribute('data-on') === 'true';
        t.setAttribute('data-on', String(!on));
      });
    });

    // Simple tap affordances for cards (optional)
    document.querySelectorAll('[role="button"]').forEach(el => {
      el.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); el.click(); }
      });
    });

    // Demo handlers
    document.querySelector('.logout')?.addEventListener('click', () => {
      // Replace with your auth flow
      alert('Logout');
    });
  </script>
</body>
</html>
