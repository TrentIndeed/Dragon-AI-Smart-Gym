<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dragon AI Smart Gym</title>
  <style>
    :root{
      --bg:#070a12;
      --card:#0c1221cc;
      --card2:#0b1020e6;
      --stroke:rgba(255,255,255,.08);
      --text:rgba(255,255,255,.92);
      --muted:rgba(255,255,255,.65);
      --muted2:rgba(255,255,255,.45);
      --blue1:#2aa7ff;
      --blue2:#1a6dff;
      --green1:#31d15e;
      --green2:#19a44a;
      --red1:#ff4d6a;
      --red2:#ff2d55;
    }

    *{box-sizing:border-box;}
    html,body{height:100%;}
    body{
      margin:0;
      background:#02030a;
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji","Segoe UI Emoji";
    }

    .home{
      min-height:100%;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:24px;
      padding:48px 16px;
      background:
        radial-gradient(120% 90% at 20% 20%, rgba(42,167,255,.14), transparent 60%),
        radial-gradient(120% 90% at 80% 80%, rgba(49,209,94,.12), transparent 55%),
        linear-gradient(180deg, #070a12, #03040b 70%);
    }

    .home h1{
      font-size:34px;
      margin:0;
      font-weight:800;
      letter-spacing:.4px;
    }

    .home p{
      margin:0;
      color:var(--muted);
      max-width:520px;
      text-align:center;
      font-size:16px;
    }

    .primary-action{
      padding:14px 28px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.16);
      background:linear-gradient(180deg, rgba(42,167,255,.95), rgba(26,109,255,.9));
      color:white;
      font-weight:800;
      cursor:pointer;
      box-shadow:0 16px 40px rgba(0,0,0,.45);
      letter-spacing:.2px;
    }

    .primary-action:active{transform:translateY(1px);}

    .overlay{
      position:fixed;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      background:rgba(2,3,8,.72);
      backdrop-filter: blur(2px);
      z-index:20;
    }

    .overlay.is-visible{display:flex;}

    /* 9:16 phone stage */
    .stage{
      position:relative;
      width:min(390px, 95vw);
      aspect-ratio:9/16;
      border-radius:28px;
      overflow:hidden;
      background: radial-gradient(110% 80% at 30% 20%, rgba(42,167,255,.25), transparent 55%),
                  radial-gradient(90% 70% at 70% 80%, rgba(49,209,94,.18), transparent 55%),
                  linear-gradient(180deg, #070a12, #04050b 65%, #03040a);
      box-shadow: 0 20px 70px rgba(0,0,0,.65);
    }

    /* blurred "gym" circles in the back like the screenshot */
    .bg-orbs{
      position:absolute; inset:-40px;
      filter: blur(10px);
      opacity:.45;
      pointer-events:none;
      background:
        radial-gradient(closest-side at 25% 20%, rgba(255,255,255,.18), rgba(255,255,255,0) 65%),
        radial-gradient(closest-side at 72% 18%, rgba(255,255,255,.14), rgba(255,255,255,0) 60%),
        radial-gradient(closest-side at 55% 68%, rgba(255,255,255,.10), rgba(255,255,255,0) 60%),
        radial-gradient(closest-side at 40% 55%, rgba(26,109,255,.10), rgba(255,255,255,0) 60%);
    }

    .vignette{
      position:absolute; inset:0;
      background: radial-gradient(70% 60% at 50% 35%, transparent 20%, rgba(0,0,0,.35) 70%, rgba(0,0,0,.65));
      pointer-events:none;
    }

    .confetti{
      position:absolute; inset:0;
      pointer-events:none;
      overflow:hidden;
    }

    .confetti-piece{
      position:absolute;
      width:8px; height:8px;
      border-radius:2px;
      opacity:.9;
      transform: translate3d(0,0,0) rotate(0deg);
      will-change: transform;
    }

    .wrap{
      position:relative;
      height:100%;
      padding:40px 22px 28px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      gap:18px;
    }

    .headline{
      margin-top:18px;
      font-weight:800;
      font-size:34px;
      letter-spacing:.2px;
      color:rgba(255,255,255,.92);
      text-shadow: 0 10px 35px rgba(0,0,0,.65);
    }

    .card{
      width: 100%;
      max-width: 330px;
      border-radius:18px;
      background: linear-gradient(180deg, rgba(12,18,33,.88), rgba(8,12,24,.92));
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: 0 18px 45px rgba(0,0,0,.55);
      overflow:hidden;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .card-header{
      height:42px;
      padding:0 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      background: linear-gradient(90deg, #2aa7ff, #1a6dff);
      color:white;
      font-weight:700;
      font-size:14px;
      letter-spacing:.2px;
    }

    .share{
      display:flex;
      align-items:center;
      gap:8px;
      font-weight:700;
      opacity:.95;
    }

    .share-badge{
      display:inline-grid;
      place-items:center;
      min-width:18px;
      height:18px;
      padding:0 6px;
      border-radius:999px;
      background: rgba(255,255,255,.22);
      border: 1px solid rgba(255,255,255,.25);
      font-size:12px;
    }

    .card-body{
      padding:16px 16px 14px;
      background: linear-gradient(180deg, rgba(12,18,33,.55), rgba(8,12,24,.72));
    }

    .top-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
      margin-bottom:14px;
    }

    .top-left .label{
      color:var(--muted);
      font-size:12px;
      font-weight:600;
    }

    .top-left .value{
      margin-top:2px;
      font-size:22px;
      font-weight:800;
      color:var(--text);
      letter-spacing:.2px;
    }

    .top-right{
      display:flex;
      align-items:center;
      gap:8px;
      color:rgba(255,255,255,.70);
      font-size:12px;
      font-weight:700;
    }

    .pill-icon{
      width:16px; height:16px;
      opacity:.95;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,.35));
    }

    .grid{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:14px 14px;
      padding-top:8px;
    }

    .stat{
      display:flex;
      align-items:center;
      gap:10px;
      min-height:54px;
    }

    .stat .icon{
      width:40px; height:40px;
      border-radius:999px;
      display:grid;
      place-items:center;
      border: 1px solid rgba(255,255,255,.12);
      box-shadow: inset 0 0 0 1px rgba(0,0,0,.14), 0 10px 22px rgba(0,0,0,.35);
    }

    .icon.blue{ background: radial-gradient(90% 90% at 30% 20%, rgba(255,255,255,.18), rgba(255,255,255,0) 40%), linear-gradient(180deg, rgba(42,167,255,.40), rgba(42,167,255,.18)); }
    .icon.green{ background: radial-gradient(90% 90% at 30% 20%, rgba(255,255,255,.18), rgba(255,255,255,0) 40%), linear-gradient(180deg, rgba(49,209,94,.40), rgba(49,209,94,.18)); }
    .icon.red{ background: radial-gradient(90% 90% at 30% 20%, rgba(255,255,255,.18), rgba(255,255,255,0) 40%), linear-gradient(180deg, rgba(255,45,85,.42), rgba(255,45,85,.18)); }

    .stat .meta{display:flex; flex-direction:column; line-height:1.05;}
    .stat .meta .k{ color:var(--muted2); font-size:12px; font-weight:700; }
    .stat .meta .v{ margin-top:4px; color:var(--text); font-size:22px; font-weight:900; letter-spacing:.2px; }
    .stat .meta .unit{ font-size:14px; font-weight:800; color:rgba(255,255,255,.78); margin-left:6px; }

    .time .meta .v{ font-variant-numeric: tabular-nums; }

    .cta-wrap{
      margin-top:auto;
      width:100%;
      display:flex;
      justify-content:center;
      padding-bottom:14px;
    }

    .cta{
      width: min(340px, 92%);
      height:54px;
      border-radius:999px;
      border: 1px solid rgba(255,255,255,.14);
      background: linear-gradient(180deg, rgba(49,209,94,1), rgba(25,164,74,1));
      color: rgba(255,255,255,.98);
      font-weight:900;
      letter-spacing:.2px;
      font-size:16px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      box-shadow: 0 16px 40px rgba(0,0,0,.55), inset 0 0 0 1px rgba(0,0,0,.18);
      cursor:pointer;
      user-select:none;
    }

    .cta:active{ transform: translateY(1px); }

    .bolt{
      width:18px; height:18px;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,.35));
    }

    /* Subtle scaling so it feels like a real in-app modal */
    .card, .cta{ animation: pop .55s cubic-bezier(.2,.9,.2,1) both; }
    .cta{ animation-delay: .05s; }

    @keyframes pop{
      0%{ transform: translateY(12px) scale(.96); opacity:0; }
      100%{ transform: translateY(0) scale(1); opacity:1; }
    }

    .close-hint{
      margin-top:8px;
      font-size:12px;
      color:rgba(255,255,255,.6);
    }

    /* Accessibility: reduce motion */
    @media (prefers-reduced-motion: reduce){
      .card, .cta{ animation:none; }
      .confetti-piece{ animation:none !important; }
    }
  </style>
</head>
<body>
  <main class="home">
    <h1>Dragon AI Smart Gym</h1>
    <p>Track your workout in real time. When you finish a set, the home screen celebrates your results with a quick summary and XP boost.</p>
    <button class="primary-action" id="endWorkout" type="button">End Workout</button>
  </main>

  <div class="overlay" id="summaryOverlay" aria-hidden="true">
    <div class="stage" role="img" aria-label="Set Complete workout summary modal">
      <div class="bg-orbs"></div>

      <div class="confetti" id="confetti"></div>

      <div class="vignette"></div>

      <div class="wrap">
        <div class="headline">Set Complete!</div>

        <div class="card" role="dialog" aria-modal="true" aria-label="Workout Summary">
          <div class="card-header">
            <div>Workout Summary</div>
            <div class="share" aria-label="Share">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path d="M14 9V5l7 7-7 7v-4H8a5 5 0 0 1-5-5V7h2v3a3 3 0 0 0 3 3h6v-4Z" fill="rgba(255,255,255,.95)"/>
              </svg>
              <span>Share</span>
              <span class="share-badge">1</span>
            </div>
          </div>

          <div class="card-body">
            <div class="top-row">
              <div class="top-left">
                <div class="label">Total Reps</div>
                <div class="value">64.0&nbsp;<span style="font-size:14px;font-weight:800;color:rgba(255,255,255,.78)">m</span></div>
              </div>

              <div class="top-right" aria-label="Set completion status and xp">
                <svg class="pill-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M9.2 16.4 4.8 12l1.4-1.4 3 3 8.6-8.6L19.2 6l-10 10.4Z" fill="rgba(46, 229, 144, .95)"/>
                </svg>
                <svg class="pill-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                  <path d="M9.2 16.4 4.8 12l1.4-1.4 3 3 8.6-8.6L19.2 6l-10 10.4Z" fill="rgba(255,255,255,.70)"/>
                </svg>
                <span style="opacity:.85;">XP</span>
              </div>
            </div>

            <div class="grid">
              <div class="stat">
                <div class="icon blue" aria-hidden="true">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <path d="M8.2 13.7c.8 1.6 2.3 2.3 4 2.3 2.2 0 3.5-1.1 4.6-2.4.5-.7.5-1.7 0-2.4-.6-.9-1.4-1.7-2.5-2.2-.6-.3-1.2-.3-1.7 0l-.7.4-.7-1.2c-.4-.7-1.2-1.1-2-1-1 .1-1.7 1-1.6 2l.2 1.3c-1.3.4-2 1.8-1.6 3.2Z" fill="rgba(255,255,255,.92)"/>
                    <path d="M4 16.5c1.4 1.6 3.2 2.5 5.8 2.5h5.1c1.2 0 2.1-.3 2.8-.9" stroke="rgba(255,255,255,.75)" stroke-width="1.6" stroke-linecap="round"/>
                  </svg>
                </div>
                <div class="meta">
                  <div class="k">Average Load</div>
                  <div class="v">17<span class="unit">lb</span></div>
                </div>
              </div>

              <div class="stat">
                <div class="icon green" aria-hidden="true">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <path d="M9 5 12 7.2 15 5l3 2.2 3 2.1-2.4 3.2-1.6-1V20H7V11.5l-1.6 1L3 9.3 6 7.2 9 5Z" fill="rgba(255,255,255,.92)"/>
                  </svg>
                </div>
                <div class="meta">
                  <div class="k">Avg Load</div>
                  <div class="v">19<span class="unit">lb</span></div>
                </div>
              </div>

              <div class="stat">
                <div class="icon red" aria-hidden="true">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M13 2 4 14h7l-1 8 9-12h-7l1-8Z" fill="rgba(255,255,255,.92)"/>
                  </svg>
                </div>
                <div class="meta">
                  <div class="k">Peak Load</div>
                  <div class="v">17<span class="unit">lb</span></div>
                </div>
              </div>

              <div class="stat time">
                <div class="icon" style="background: radial-gradient(90% 90% at 30% 20%, rgba(255,255,255,.18), rgba(255,255,255,0) 40%), linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.06));" aria-hidden="true">
                  <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
                    <path d="M12 22a10 10 0 1 0 0-20 10 10 0 0 0 0 20Z" stroke="rgba(255,255,255,.88)" stroke-width="1.7"/>
                    <path d="M12 6v6l4 2" stroke="rgba(255,255,255,.88)" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </div>
                <div class="meta">
                  <div class="k">Time</div>
                  <div class="v">0:48</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="cta-wrap">
          <button class="cta" id="ctaBtn" type="button">
            <svg class="bolt" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path d="M13 2 4 14h7l-1 8 9-12h-7l1-8Z" fill="rgba(255,255,255,.98)"/>
            </svg>
            Level Up +15 XP
          </button>
        </div>
        <div class="close-hint">Tap anywhere outside to close.</div>
      </div>
    </div>
  </div>

  <script>
    const overlay = document.getElementById('summaryOverlay');
    const confettiRoot = document.getElementById('confetti');
    const endButton = document.getElementById('endWorkout');

    const colors = [
      'rgba(42,167,255,.95)',
      'rgba(49,209,94,.95)',
      'rgba(255,45,85,.92)',
      'rgba(255,196,0,.95)',
      'rgba(255,255,255,.85)'
    ];

    const getWidth = () => confettiRoot.clientWidth;
    const getHeight = () => confettiRoot.clientHeight;

    function makePiece(){
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      const size = 6 + Math.random() * 6;
      el.style.width = `${size}px`;
      el.style.height = `${size}px`;
      el.style.background = colors[Math.floor(Math.random() * colors.length)];

      const x = Math.random() * getWidth();
      const y = -20 - Math.random() * getHeight() * 0.2;
      el.style.left = `${x}px`;
      el.style.top = `${y}px`;

      const drift = (Math.random() * 2 - 1) * 120;
      const rot = (Math.random() * 2 - 1) * 540;
      const duration = 2200 + Math.random() * 1800;
      const delay = Math.random() * 400;

      el.animate([
        { transform: 'translate3d(0,0,0) rotate(0deg)', opacity: .95 },
        { transform: `translate3d(${drift}px, ${getHeight() + 80}px, 0) rotate(${rot}deg)`, opacity: .95 }
      ], {
        duration,
        delay,
        easing: 'cubic-bezier(.2,.75,.2,1)',
        fill: 'forwards'
      });

      confettiRoot.appendChild(el);
      window.setTimeout(() => el.remove(), duration + delay + 100);
    }

    function burstConfetti(){
      for(let i = 0; i < 34; i++){
        makePiece();
      }

      let count = 0;
      const id = window.setInterval(() => {
        makePiece();
        count += 1;
        if(count > 28) window.clearInterval(id);
      }, 90);
    }

    function showSummary(){
      overlay.classList.add('is-visible');
      overlay.setAttribute('aria-hidden', 'false');
      burstConfetti();
    }

    function hideSummary(){
      overlay.classList.remove('is-visible');
      overlay.setAttribute('aria-hidden', 'true');
    }

    endButton.addEventListener('click', showSummary);

    overlay.addEventListener('click', (event) => {
      if(event.target === overlay){
        hideSummary();
      }
    });

    document.getElementById('ctaBtn').addEventListener('click', (event) => {
      event.stopPropagation();
      for(let i = 0; i < 26; i++){
        makePiece();
      }
    });
  </script>
</body>
</html>
