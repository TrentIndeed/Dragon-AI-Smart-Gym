<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Choose Exercise</title>
  <style>
    :root{
      --bg:#000;
      --text:#fff;
      --muted:rgba(255,255,255,.72);
      --muted2:rgba(255,255,255,.55);
      --cardRadius:34px;
      --activeGlow:rgba(0,170,255,.85);
      --activeGlow2:rgba(0,120,255,.55);
      --btnBlue:#1a6fff;
      --btnBlue2:#0a52da;
      --pillBg:rgba(35,35,35,.9);
    }

    *{box-sizing:border-box;}
    html,body{height:100%;}
    body{
      margin:0;
      background: radial-gradient(1200px 1200px at 50% 35%, rgba(0,140,255,.12), transparent 60%),
                  radial-gradient(900px 900px at 15% 70%, rgba(0,140,255,.08), transparent 55%),
                  #000;
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      overflow:hidden;
    }

    body.app-started #loadScreen{display:none;}
    body.app-started #appRoot{display:flex;}

    /* --- Safe-area helpers --- */
    .safeTop{padding-top: max(12px, env(safe-area-inset-top));}
    .safeBottom{padding-bottom: max(12px, env(safe-area-inset-bottom));}

    /* --- Top bar --- */
    .topbar{
      position:relative;
      width:100%;
      padding: 18px 18px 8px;
      display:flex;
      align-items:center;
      justify-content:center;
      z-index:10;
    }
    .topbar .left, .topbar .right{
      position:absolute;
      top: 18px;
      display:flex;
      align-items:center;
      gap:10px;
    }
    .topbar .left{left:18px;}
    .topbar .right{right:18px;}

    .backPill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(25,25,25,.92);
      border: 1px solid rgba(255,255,255,.08);
      color: rgba(255,255,255,.92);
      cursor:pointer;
      user-select:none;
      -webkit-tap-highlight-color: transparent;
      box-shadow: 0 8px 22px rgba(0,0,0,.45);
    }
    .backPill:active{transform: translateY(1px);}
    .backPill span{font-size:14px; font-weight:600; letter-spacing:.1px;}

    .title{
      font-size:20px;
      font-weight:700;
      letter-spacing:.2px;
      text-align:center;
      line-height:1;
      margin-top: 2px;
      text-shadow: 0 10px 28px rgba(0,0,0,.65);
    }

    .iconBtn{
      width:42px;
      height:42px;
      border-radius: 999px;
      display:grid;
      place-items:center;
      background: rgba(0,0,0,0);
      border: 1px solid rgba(255,255,255,0);
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
      opacity:.95;
    }
    .iconBtn:hover{opacity:1;}

    /* --- Layout --- */
    .screen{
      height:100%;
      display:flex;
      flex-direction:column;
    }

    .carouselArea{
      flex:1;
      display:flex;
      align-items:center;
      justify-content:center;
      padding: 10px 0 0;
      position:relative;
    }

    .carousel{
      position:relative;
      width:100%;
      height: 100%;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      touch-action: pan-y;
    }

    .track{
      display:flex;
      align-items:center;
      height: 100%;
      will-change: transform;
      transition: transform 1200ms cubic-bezier(.2,.85,.15,1);
      padding-left: 50vw;
      padding-right: 50vw;
    }
    .dragging .track{transition:none;}

    /* --- Card --- */
    .cardWrap{
      width: 76vw;
      max-width: 380px;
      height: 70vh;
      max-height: 620px;
      margin: 0 18px;
      position:relative;
      flex: 0 0 auto;
    }

    .card{
      position:absolute;
      inset:0;
      border-radius: var(--cardRadius);
      overflow:hidden;
      background: #111;
      box-shadow: 0 30px 60px rgba(0,0,0,.6);
      transform: translateZ(0);
    }

    /* Inner frame mimics the screenshot's double border/glow */
    .card::before{
      content:"";
      position:absolute;
      inset: 10px;
      border-radius: calc(var(--cardRadius) - 10px);
      border: 2px solid rgba(255,255,255,.08);
      pointer-events:none;
      opacity:.75;
    }

    .cardImg{
      position:absolute;
      inset:0;
      background-position:center;
      background-size:cover;
      filter: contrast(1.02) saturate(1.04);
      transform: scale(1.02);
    }

    .shade{
      position:absolute;
      inset:0;
      background:
        radial-gradient(900px 400px at 50% 15%, rgba(0,0,0,.15), rgba(0,0,0,.75) 70%),
        linear-gradient(to top, rgba(0,0,0,.95) 0%, rgba(0,0,0,.55) 25%, rgba(0,0,0,0) 62%);
    }

    .tag{
      position:absolute;
      top: 18px;
      left: 18px;
      padding: 10px 14px;
      border-radius: 999px;
      font-weight:800;
      font-size:14px;
      color: rgba(255,255,255,.95);
      box-shadow: 0 14px 30px rgba(0,0,0,.35);
      display:inline-flex;
      gap:8px;
      align-items:center;
      line-height:1;
    }

    .content{
      position:absolute;
      left: 22px;
      right: 22px;
      bottom: 18px;
    }

    .exerciseTitle{
      font-size:28px;
      font-weight:800;
      letter-spacing:.2px;
      margin:0 0 12px 0;
      text-shadow: 0 16px 36px rgba(0,0,0,.65);
    }

    .metaRow{
      display:flex;
      align-items:center;
      gap:10px;
      color: var(--muted);
      font-weight:700;
      font-size:14px;
    }

    .metaIcon{
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: rgba(255,255,255,.93);
      display:grid;
      place-items:center;
      box-shadow: 0 12px 26px rgba(0,0,0,.45);
    }

    .metaIcon svg{width:20px;height:20px; opacity:.9;}

    /* --- Active / Inactive states (matched to screenshot) --- */
    .cardWrap[data-state="active"] .card{
      border: 3px solid rgba(0,190,255,.45);
      box-shadow:
        0 0 0 1px rgba(0,120,255,.15),
        0 0 26px 6px rgba(0,160,255,.28),
        0 26px 60px rgba(0,0,0,.75);
    }
    .cardWrap[data-state="active"] .card::before{
      border-color: rgba(255,255,255,.18);
      opacity:.9;
    }

    .cardWrap[data-state="prev"],
    .cardWrap[data-state="next"]{
      opacity: .35;
      filter: blur(.35px);
      transform: scale(.98);
    }
    .cardWrap[data-state="prev"] .card,
    .cardWrap[data-state="next"] .card{
      border: 1px solid rgba(255,255,255,.06);
      box-shadow: 0 22px 50px rgba(0,0,0,.55);
    }
    .cardWrap[data-state="prev"] .cardImg,
    .cardWrap[data-state="next"] .cardImg{
      filter: brightness(.72) contrast(.95) saturate(.9);
    }

    /* --- Bottom button --- */
    .bottom{
      padding: 0 18px 22px;
      position:relative;
      z-index:10;
      display:flex;
      justify-content:center;
    }

    .beginBtn{
      width:24%;
      min-width: 120px;
      margin: 0 auto;
      height: 44px;
      border-radius: 999px;
      border: none;
      color: rgba(255,255,255,.96);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: .2px;
      background: linear-gradient(180deg, rgba(34,130,255,.9), rgba(14,90,220,.9));
      box-shadow:
        0 14px 28px rgba(0,0,0,.45),
        0 0 0 1px rgba(255,255,255,.06) inset;
      cursor:pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .beginBtn:active{transform: translateY(1px);}

    /* --- Small helper fade at edges like screenshot --- */
    .edgeFade{
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(to right, rgba(0,0,0,.9) 0%, rgba(0,0,0,0) 18%, rgba(0,0,0,0) 82%, rgba(0,0,0,.9) 100%);
      z-index:3;
    }

    /* --- Desktop preview helpers --- */
    @media (min-width: 520px){
      .cardWrap{width: 360px; height: 610px;}
      .bottom{padding-bottom: 26px;}
    }

    .appRoot{
      height:100%;
      display:none;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:16px;
      text-align:center;
      padding:24px;
    }

    .appRoot h1{
      font-size:32px;
      margin:0;
    }

    .appRoot p{
      margin:0;
      color:var(--muted2);
      max-width:520px;
    }
  </style>
</head>
<body>
  <div id="loadScreen" class="screen safeTop safeBottom">
    <header class="topbar">
      <div class="left">
        <button class="backPill" id="backBtn" aria-label="Back">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M15 18l-6-6 6-6" stroke="rgba(255,255,255,.92)" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Back</span>
        </button>
      </div>

      <div class="title">Choose Exercise</div>

      <div class="right">
        <button class="iconBtn" id="searchBtn" aria-label="Search">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M10.5 18a7.5 7.5 0 1 1 0-15 7.5 7.5 0 0 1 0 15Z" stroke="rgba(255,255,255,.95)" stroke-width="2.2"/>
            <path d="M16.5 16.5 21 21" stroke="rgba(255,255,255,.95)" stroke-width="2.2" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
    </header>

    <main class="carouselArea">
      <div class="carousel" id="carousel">
        <div class="edgeFade"></div>
        <div class="track" id="track"></div>
      </div>
    </main>

    <footer class="bottom">
      <button class="beginBtn" id="beginBtn">Begin</button>
    </footer>
  </div>

  <main id="appRoot" class="appRoot" aria-live="polite">
    <h1>Workout ready</h1>
    <p>Select a routine, sync your sensors, or jump back to choose another exercise.</p>
  </main>

  <script>
    // --- Data (swap images with your own asset URLs) ---
    // Tip: keep images 9:16-ish (or higher res) for best results.
    const workouts = [
      {
        tagText: 'Arms  Loody',
        tagColor: '#F3A11D',
        title: 'Cable Squat',
        reps: '15 Reps',
        // Replace with your real asset. This is a safe placeholder gradient image.
        image: 'data:image/svg+xml;utf8,' + encodeURIComponent(`
          <svg xmlns="http://www.w3.org/2000/svg" width="800" height="1400">
            <defs>
              <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stop-color="#2f2f2f"/>
                <stop offset="0.55" stop-color="#1a1a1a"/>
                <stop offset="1" stop-color="#080808"/>
              </linearGradient>
              <radialGradient id="r" cx="60%" cy="30%" r="70%">
                <stop offset="0" stop-color="#3aa7ff" stop-opacity="0.35"/>
                <stop offset="1" stop-color="#000" stop-opacity="0"/>
              </radialGradient>
            </defs>
            <rect width="100%" height="100%" fill="url(#g)"/>
            <rect width="100%" height="100%" fill="url(#r)"/>
            <g opacity="0.6">
              <path d="M120 980 C240 650, 520 460, 650 240" stroke="#bfbfbf" stroke-width="18" stroke-linecap="round"/>
              <path d="M90 1040 C250 720, 500 520, 680 300" stroke="#6bc6ff" stroke-width="6" stroke-linecap="round"/>
            </g>
          </svg>
        `)
      },
      {
        tagText: 'Lower',
        tagColor: '#C9B406',
        title: 'Lower Press',
        reps: '12 Reps',
        image: 'data:image/svg+xml;utf8,' + encodeURIComponent(`
          <svg xmlns="http://www.w3.org/2000/svg" width="800" height="1400">
            <defs>
              <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stop-color="#343434"/>
                <stop offset="0.55" stop-color="#1c1c1c"/>
                <stop offset="1" stop-color="#080808"/>
              </linearGradient>
              <radialGradient id="r" cx="70%" cy="28%" r="65%">
                <stop offset="0" stop-color="#ffd54a" stop-opacity="0.25"/>
                <stop offset="1" stop-color="#000" stop-opacity="0"/>
              </radialGradient>
            </defs>
            <rect width="100%" height="100%" fill="url(#g)"/>
            <rect width="100%" height="100%" fill="url(#r)"/>
            <g opacity="0.55">
              <circle cx="560" cy="560" r="210" fill="#0f0f0f"/>
              <path d="M150 1020 L700 520" stroke="#a9a9a9" stroke-width="14" stroke-linecap="round"/>
            </g>
          </svg>
        `)
      },
      {
        tagText: 'Core',
        tagColor: '#00BBD4',
        title: 'Cable Row',
        reps: '10 Reps',
        image: 'data:image/svg+xml;utf8,' + encodeURIComponent(`
          <svg xmlns="http://www.w3.org/2000/svg" width="800" height="1400">
            <defs>
              <linearGradient id="g" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0" stop-color="#2f2f2f"/>
                <stop offset="0.55" stop-color="#171717"/>
                <stop offset="1" stop-color="#070707"/>
              </linearGradient>
              <radialGradient id="r" cx="45%" cy="24%" r="70%">
                <stop offset="0" stop-color="#50e6ff" stop-opacity="0.22"/>
                <stop offset="1" stop-color="#000" stop-opacity="0"/>
              </radialGradient>
            </defs>
            <rect width="100%" height="100%" fill="url(#g)"/>
            <rect width="100%" height="100%" fill="url(#r)"/>
            <g opacity="0.55">
              <path d="M120 680 C260 520, 420 520, 680 690" stroke="#cfcfcf" stroke-width="16" stroke-linecap="round"/>
              <path d="M120 730 C260 570, 420 570, 680 740" stroke="#6bc6ff" stroke-width="6" stroke-linecap="round"/>
            </g>
          </svg>
        `)
      }
    ];

    const track = document.getElementById('track');
    const carousel = document.getElementById('carousel');

    let index = 0;
    let cardW = 0;
    let gap = 0;

    function render(){
      track.innerHTML = '';
      workouts.forEach((w, i) => {
        const wrap = document.createElement('div');
        wrap.className = 'cardWrap';
        wrap.dataset.i = i;

        const card = document.createElement('div');
        card.className = 'card';

        const img = document.createElement('div');
        img.className = 'cardImg';
        img.style.backgroundImage = `url('${w.image}')`;

        const shade = document.createElement('div');
        shade.className = 'shade';

        const tag = document.createElement('div');
        tag.className = 'tag';
        tag.style.background = w.tagColor;
        tag.textContent = w.tagText;

        const content = document.createElement('div');
        content.className = 'content';
        content.innerHTML = `
          <h2 class="exerciseTitle">${w.title}</h2>
          <div class="metaRow">
            <div class="metaIcon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M6 15.5c.5 1.8 2.6 3 6 3s5.5-1.2 6-3" stroke="#111" stroke-width="2" stroke-linecap="round"/>
                <path d="M9 5.5h6" stroke="#111" stroke-width="2" stroke-linecap="round"/>
                <path d="M8 7.8c-1.6 1.2-2.6 3-2.6 5 0 3.3 3 6 6.6 6s6.6-2.7 6.6-6c0-2-1-3.8-2.6-5" stroke="#111" stroke-width="2" stroke-linecap="round"/>
              </svg>
            </div>
            <div>${w.reps}</div>
          </div>
        `;

        card.appendChild(img);
        card.appendChild(shade);
        card.appendChild(tag);
        card.appendChild(content);
        wrap.appendChild(card);
        track.appendChild(wrap);
      });

      measure();
      applyStates();
      snapTo(index, false);
    }

    function measure(){
      const first = track.querySelector('.cardWrap');
      if(!first) return;
      const r = first.getBoundingClientRect();
      cardW = r.width;
      // margin-left + margin-right in CSS
      gap = 36;
    }

    function applyStates(){
      const wraps = [...track.querySelectorAll('.cardWrap')];
      wraps.forEach(w => w.dataset.state = '');
      if(wraps[index]) wraps[index].dataset.state = 'active';
      if(wraps[index-1]) wraps[index-1].dataset.state = 'prev';
      if(wraps[index+1]) wraps[index+1].dataset.state = 'next';
    }

    function snapTo(i, animate=true){
      const wraps = [...track.querySelectorAll('.cardWrap')];
      if(!wraps.length) return;

      index = (i + wraps.length) % wraps.length;
      applyStates();

      // Robust centering: compute centers from real DOM rects.
      // This works correctly even with track padding, margins, and existing transforms.
      const carouselRect = carousel.getBoundingClientRect();
      const carouselCenter = carouselRect.left + carouselRect.width / 2;

      const active = wraps[index];
      const activeRect = active.getBoundingClientRect();
      const activeCenter = activeRect.left + activeRect.width / 2;

      const currentX = getTransformX();
      const delta = carouselCenter - activeCenter;
      const nextX = currentX + delta;

      if(!animate) track.style.transition = 'none';
      requestAnimationFrame(() => {
        track.style.transform = `translateX(${nextX}px)`;
        if(!animate) {
          // restore for next transitions
          requestAnimationFrame(() => track.style.transition = 'transform 1200ms cubic-bezier(.2,.85,.15,1)');
        }
      });
    }

    // --- Drag/swipe ---
    let isDown = false;
    let startX = 0;
    let startTransformX = 0;
    let lastX = 0;

    function getTransformX(){
      const m = new DOMMatrixReadOnly(getComputedStyle(track).transform);
      return m.m41 || 0;
    }

    function onDown(e){
      isDown = true;
      carousel.classList.add('dragging');
      startX = (e.touches ? e.touches[0].clientX : e.clientX);
      lastX = startX;
      startTransformX = getTransformX();
      stopAuto();
    }

    function onMove(e){
      if(!isDown) return;
      const x = (e.touches ? e.touches[0].clientX : e.clientX);
      const dx = x - startX;
      lastX = x;
      track.style.transform = `translateX(${startTransformX + dx}px)`;
    }

    function onUp(){
      if(!isDown) return;
      isDown = false;
      carousel.classList.remove('dragging');

      const endX = lastX;
      const dx = endX - startX;
      const threshold = Math.min(90, cardW * 0.22);

      if(dx < -threshold) snapTo(index + 1);
      else if(dx > threshold) snapTo(index - 1);
      else snapTo(index);

      startAuto();
    }

    carousel.addEventListener('mousedown', onDown);
    window.addEventListener('mousemove', onMove);
    window.addEventListener('mouseup', onUp);

    carousel.addEventListener('touchstart', onDown, {passive:true});
    window.addEventListener('touchmove', onMove, {passive:true});
    window.addEventListener('touchend', onUp, {passive:true});

    // --- Slow auto-swipe like your loading screen ---
    let autoTimer = null;
    function startAuto(){
      stopAuto();
      autoTimer = setInterval(() => snapTo(index + 1), 5000);
    }
    function stopAuto(){
      if(autoTimer) clearInterval(autoTimer);
      autoTimer = null;
    }

    // --- Hook up buttons (replace with your routing) ---
    document.getElementById('backBtn').addEventListener('click', () => {
      console.log('Back');
    });
    document.getElementById('searchBtn').addEventListener('click', () => {
      console.log('Search');
    });
    document.getElementById('beginBtn').addEventListener('click', () => {
      const w = workouts[index];
      document.body.classList.add('app-started');
      stopAuto();
      console.log('Begin', w);
    });

    // --- Init ---
    render();
    startAuto();

    window.addEventListener('resize', () => {
      measure();
      snapTo(index, false);
    });
  </script>
</body>
</html>
